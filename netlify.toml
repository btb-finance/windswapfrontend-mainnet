[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  BUN_VERSION = "1.3.11"
  NODE_VERSION = "25.8.2"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUBGRAPH_API_KEY,NEXT_PUBLIC_SUBGRAPH_URL"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET"

[[headers]]
  for = "/.well-known/base-app-manifest.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET"
    Content-Type = "application/json"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

# Long-term cache for immutable Next.js static assets (_next/static)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache public images for 7 days
[[headers]]
  for = "/logo/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/logo.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Social/embed preview images — served to crawlers (Twitter, Farcaster, etc.)
[[headers]]
  for = "/og.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/EmbedPreview.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/splash.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/logowithbackground.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/screenshot1.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/screenshot2.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/screenshot3.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"
